apiVersion: local.storage.openshift.io/v1
kind: LocalVolume
metadata:
  name: local-block-volumes
  namespace: openshift-local-storage
spec:
  nodeSelector:
    nodeSelectorTerms:
    - matchExpressions:
      - key: cluster.ocs.openshift.io/local-storage
        operator: In
        values:
        - "true"
  storageClassDevices:
    - storageClassName: local-block
      volumeMode: Block
      fsType: "" # Expose as raw block device